apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab3-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lab3-app
  template:
    metadata:
      labels:
        app: lab3-app
    spec:
      containers:
        - name: lab3-app
          image: your-image:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: lab3-app-service
spec:
  selector:
    app: lab3-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
